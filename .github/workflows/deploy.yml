name: Build and Test Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t railman-app:latest .

      - name: Run container for smoke test
        run: |
          docker run -d --name railman-test -p 8080:80 railman-app:latest
          sleep 5
          docker ps

      - name: Verify Nginx is serving content
        run: |
          curl -s http://localhost:8080 | grep -i "Railman" && \
          echo "✅ App is serving content successfully"

      - name: Stop test container
        run: |
          docker stop railman-test
          docker rm railman-test

      - name: Build summary
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "Docker image built and smoke-tested successfully." >> $GITHUB_STEP_SUMMARY
          echo "Ready for deployment to AWS EC2 (Mumbai - ap-south-1)." >> $GITHUB_STEP_SUMMARY
